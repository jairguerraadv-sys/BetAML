name: Release Readiness

"on":
  workflow_dispatch:
    inputs:
      e2e_username:
        description: "Usuario para smoke E2E"
        required: true
        type: string
      e2e_password:
        description: "Senha para smoke E2E"
        required: true
        type: string

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  BASE_URL: "http://localhost:3000"
  E2E_API_URL: "http://localhost:8000"

jobs:
  readiness:
    name: Full Readiness Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            services/api/requirements.txt
            requirements-dev.txt

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: e2e/package.json

      - name: Install API dependencies
        run: |
          pip install --upgrade pip
          pip install -r services/api/requirements.txt

      - name: Validate Alembic chain
        working-directory: services/api
        run: |
          python -m alembic -c alembic.ini heads
          python -m alembic -c alembic.ini history

      - name: Start services for readiness smoke
        run: |
          cp .env.example .env
          docker compose -f infra/docker-compose.yml up -d \
            postgres redis redpanda topic-init api frontend

      - name: Wait for API and frontend health
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:8000/health && break
            echo "Waiting for API... ($i/40)" && sleep 3
          done

          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break
            echo "Waiting for frontend... ($i/30)" && sleep 3
          done

      - name: Validate legacy migration dry-run
        run: bash scripts/postgres_migrate_existing.sh --dry-run

      - name: Install Playwright deps
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Create E2E env
        working-directory: e2e
        run: |
          if [ -z "${E2E_USERNAME}" ] || [ -z "${E2E_PASSWORD}" ]; then
            echo "e2e_username/e2e_password nao informados no workflow_dispatch." >&2
            exit 1
          fi
          cat > .env.e2e <<EOF
          BASE_URL=${BASE_URL}
          E2E_API_URL=${E2E_API_URL}
          E2E_USERNAME=${E2E_USERNAME}
          E2E_PASSWORD=${E2E_PASSWORD}
          EOF
        env:
          E2E_USERNAME: ${{ github.event.inputs.e2e_username }}
          E2E_PASSWORD: ${{ github.event.inputs.e2e_password }}

      - name: Run readiness smoke tests
        working-directory: e2e
        run: npx playwright test tests/auth.spec.ts tests/cases.spec.ts --reporter=line

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v || true
