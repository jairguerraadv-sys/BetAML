name: E2E Tests

"on":
  workflow_dispatch:          # manual trigger via GitHub UI
    inputs:
      e2e_username:
        description: "Usuario de teste E2E"
        required: false
        default: "analyst_a"
      e2e_password:
        description: "Senha de teste E2E"
        required: false
        default: "analyst123"
  schedule:
    - cron: '0 6 * * 1'      # every Monday 06:00 UTC

env:
  NODE_VERSION: "20"
  BASE_URL: "http://localhost:3000"
  E2E_API_URL: "http://localhost:8000"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Start full stack via docker compose
      - name: Start services
        run: |
          cp .env.example .env
          docker compose -f infra/docker-compose.yml up -d \
            postgres redis redpanda topic-init api frontend
        env:
          JWT_SECRET: ci-e2e-secret-at-least-32-characters-long
          PII_ENCRYPTION_KEY: ci-pii-key-32-characters-long!!
          BACKEND_API_URL: http://api:8000
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            echo "Waiting for API... ($i/30)" && sleep 5
          done

      - name: Wait for frontend
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000 && break
            echo "Waiting for frontend... ($i/20)" && sleep 5
          done

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: npm ci

      - name: Create E2E env file
        working-directory: e2e
        run: |
          if [ -z "${E2E_USERNAME}" ] || [ -z "${E2E_PASSWORD}" ]; then
            echo "E2E_USERNAME/E2E_PASSWORD nao definidos nos inputs do workflow." >&2
            exit 1
          fi
          cat > .env.e2e <<EOF
          BASE_URL=${BASE_URL}
          E2E_API_URL=${E2E_API_URL}
          E2E_USERNAME=${E2E_USERNAME}
          E2E_PASSWORD=${E2E_PASSWORD}
          EOF
        env:
          E2E_USERNAME: ${{ github.event.inputs.e2e_username || 'analyst_a' }}
          E2E_PASSWORD: ${{ github.event.inputs.e2e_password || 'analyst123' }}

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        working-directory: e2e
        run: npx playwright test tests/auth.spec.ts tests/cases.spec.ts --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
