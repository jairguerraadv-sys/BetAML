name: Capacity Smoke

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 2"

jobs:
  load-smoke:
    name: Locust Load Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install load-test dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Start stack for load smoke
        run: |
          cp .env.example .env

          # Start Postgres first to avoid dependency race with heavy init scripts.
          docker compose -f infra/docker-compose.yml up -d postgres

          for i in $(seq 1 80); do
            docker compose -f infra/docker-compose.yml exec -T postgres pg_isready -U betaml >/dev/null 2>&1 && break
            echo "Waiting for postgres... ($i/80)"
            sleep 3
          done

          docker compose -f infra/docker-compose.yml up -d \
            redis redpanda topic-init api

      - name: Wait for API
        run: |
          for i in $(seq 1 70); do
            curl -sf http://localhost:8000/health >/dev/null && exit 0
            echo "Waiting for API... ($i/70)"
            sleep 3
          done
          echo "API not ready" >&2
          docker compose -f infra/docker-compose.yml logs postgres api || true
          exit 1

      - name: Run Locust smoke (batch ingest focus)
        run: |
          locust -f tests/load/locustfile.py \
            --host http://localhost:8000 \
            --headless \
            --users 20 \
            --spawn-rate 5 \
            --run-time 120s \
            --only-summary \
            --exit-code-on-error 1

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v || true
