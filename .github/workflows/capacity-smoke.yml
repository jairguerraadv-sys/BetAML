name: Capacity Smoke

"on":
  workflow_dispatch:
    inputs:
      locust_users:
        description: "Numero de usuarios Locust"
        required: false
        default: "20"
        type: string
      locust_spawn_rate:
        description: "Taxa de spawn por segundo"
        required: false
        default: "5"
        type: string
      locust_run_time:
        description: "Duracao do teste (ex.: 120s, 5m)"
        required: false
        default: "120s"
        type: string
      min_rps:
        description: "Minimo de requests/s aceito para POST /ingest/batch"
        required: false
        default: "15"
        type: string
      min_event_rps:
        description: "Minimo de eventos/s aceito para POST /ingest/batch"
        required: false
        default: "150"
        type: string
      max_p95_ms:
        description: "Maximo de p95 em ms aceito para POST /ingest/batch"
        required: false
        default: "2000"
        type: string
      max_failure_rate_pct:
        description: "Maximo de percentual de falhas aceito"
        required: false
        default: "1"
        type: string
  schedule:
    - cron: "0 3 * * 2"

env:
  LOCUST_USERS: ${{ github.event.inputs.locust_users || '20' }}
  LOCUST_SPAWN_RATE: ${{ github.event.inputs.locust_spawn_rate || '5' }}
  LOCUST_RUN_TIME: ${{ github.event.inputs.locust_run_time || '120s' }}
  LOAD_MIN_RPS: ${{ github.event.inputs.min_rps || '15' }}
  LOAD_MIN_EVENT_RPS: ${{ github.event.inputs.min_event_rps || '150' }}
  LOAD_MAX_P95_MS: ${{ github.event.inputs.max_p95_ms || '2000' }}
  LOAD_MAX_FAILURE_RATE_PCT: ${{ github.event.inputs.max_failure_rate_pct || '1' }}
  LOAD_BATCH_SIZE: "10"

jobs:
  load-smoke:
    name: Locust Load Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install load-test dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Start stack for load smoke
        run: |
          cp .env.example .env

          # Start Postgres first to avoid dependency race with heavy init scripts.
          docker compose -f infra/docker-compose.yml up -d postgres

          for i in $(seq 1 80); do
              docker compose -f infra/docker-compose.yml exec -T postgres pg_isready -U betaml -d betaml_dev >/dev/null 2>&1 && break
            echo "Waiting for postgres... ($i/80)"
            sleep 3
          done

          docker compose -f infra/docker-compose.yml up -d \
            redis redpanda topic-init api

      - name: Wait for API
        run: |
          for i in $(seq 1 70); do
            curl -sf http://localhost:8000/health >/dev/null && exit 0
            echo "Waiting for API... ($i/70)"
            sleep 3
          done
          echo "API not ready" >&2
          docker compose -f infra/docker-compose.yml logs postgres api || true
          exit 1

      - name: Run Locust smoke (batch ingest focus)
        run: |
          locust -f tests/load/locustfile.py \
            --host http://localhost:8000 \
            --headless \
            --users "${LOCUST_USERS}" \
            --spawn-rate "${LOCUST_SPAWN_RATE}" \
            --run-time "${LOCUST_RUN_TIME}" \
            --csv /tmp/betaml_load_results \
            --html /tmp/betaml_load_report.html \
            --exit-code-on-error 1

      - name: Generate load summary
        run: |
          python tests/load/generate_report.py /tmp/betaml_load_results --output /tmp/betaml_load_summary.csv

      - name: Validate SLO thresholds
        run: |
          python tests/load/validate_slo.py /tmp/betaml_load_results \
            --request-name "POST /ingest/batch" \
            --batch-size "${LOAD_BATCH_SIZE}" \
            --min-rps "${LOAD_MIN_RPS}" \
            --min-event-rps "${LOAD_MIN_EVENT_RPS}" \
            --max-p95-ms "${LOAD_MAX_P95_MS}" \
            --max-failure-rate-pct "${LOAD_MAX_FAILURE_RATE_PCT}" \
            --evidence-out /tmp/betaml_load_slo.txt

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --no-color > /tmp/capacity-smoke-docker-logs.txt || true

      - name: Upload capacity smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: artifact-capacity-smoke
          path: |
            /tmp/betaml_load_results_*.csv
            /tmp/betaml_load_report.html
            /tmp/betaml_load_summary.csv
            /tmp/betaml_load_slo.txt
            /tmp/capacity-smoke-docker-logs.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v || true
