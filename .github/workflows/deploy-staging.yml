name: Deploy to Staging

"on":
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: git SHA)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/betaml
  HELM_RELEASE: betaml-staging
  K8S_NAMESPACE: betaml-staging
  HELM_CHART_PATH: helm/betaml

jobs:
  # ── Build & Push Docker images ─────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, frontend, stream-processor, rules-engine, ml-service, ml-trainer]
        include:
          - service: api
            context: .
            dockerfile: services/api/Dockerfile
          - service: frontend
            context: services/frontend
            dockerfile: services/frontend/Dockerfile
          - service: stream-processor
            context: .
            dockerfile: services/stream_processor/Dockerfile
          - service: rules-engine
            context: .
            dockerfile: services/rules_engine/Dockerfile
          - service: ml-service
            context: .
            dockerfile: services/ml_service/Dockerfile
          - service: ml-trainer
            context: .
            dockerfile: services/ml_trainer/Dockerfile

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ inputs.image_tag || github.sha }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  # ── Deploy to Staging via Helm ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging (Helm)
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: staging
      url: https://staging.betaml.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Create namespace if not exists
        run: kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          TAG="${{ needs.build-push.outputs.image_tag || github.sha }}"
          helm upgrade --install "$HELM_RELEASE" "$HELM_CHART_PATH" \
            --namespace "$K8S_NAMESPACE" \
            --values "$HELM_CHART_PATH/values.yaml" \
            --values "$HELM_CHART_PATH/values-staging.yaml" \
            --set global.imageRegistry="${REGISTRY}/${{ github.repository_owner }}/betaml" \
            --set global.imageTag="${TAG}" \
            --set backup.enabled=true \
            --timeout 10m \
            --wait \
            --atomic

      - name: Verify deployment health
        run: |
          echo "Waiting for API rollout..."
          kubectl rollout status deployment/"${HELM_RELEASE}-api" \
            --namespace "$K8S_NAMESPACE" --timeout=300s

          echo "Waiting for frontend rollout..."
          kubectl rollout status deployment/"${HELM_RELEASE}-frontend" \
            --namespace "$K8S_NAMESPACE" --timeout=300s

      - name: Smoke test — API health
        run: |
          API_URL=$(kubectl get ingress "$HELM_RELEASE" -n "$K8S_NAMESPACE" \
            -o jsonpath='{.spec.rules[0].host}')
          for i in $(seq 1 10); do
            STATUS=$(curl -sk -o /dev/null -w '%{http_code}' "https://${API_URL}/api/health/ready" || true)
            if [ "$STATUS" = "200" ]; then
              echo "API healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "API did not become healthy" >&2
          exit 1

  # ── Post-deploy notification ───────────────────────────────────────────────
  notify:
    name: Notify Deploy Result
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: always()

    steps:
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ needs.deploy-staging.result }}"
          EMOJI="✅"
          [ "$STATUS" != "success" ] && EMOJI="🔴"

          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"${EMOJI} BetAML Staging Deploy: *${STATUS}*\nCommit: \`${GITHUB_SHA:0:8}\`\nActor: ${GITHUB_ACTOR}\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"
            }"
