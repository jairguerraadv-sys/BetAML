name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Repo hygiene: evitar segredos locais versionados ──────────────────────
  secret-hygiene:
    name: Secret Hygiene Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure e2e/.env.e2e is not tracked
        run: |
          if git ls-files --error-unmatch e2e/.env.e2e >/dev/null 2>&1; then
            echo "ERROR: e2e/.env.e2e nao deve ser versionado. Use e2e/.env.e2e.example." >&2
            exit 1
          fi

      - name: Block known default credentials in tracked files
        run: |
          if git grep -nE 'E2E_PASSWORD=(admin123|analyst123)' -- ':!e2e/.env.e2e.example'; then
            echo "ERROR: credenciais default detectadas em arquivo versionado." >&2
            exit 1
          fi

  # ── Backend: unit + security + integration (mock) tests ────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            services/api/requirements.txt

      - name: Install API + dev dependencies
        run: |
          pip install --upgrade pip
          pip install -r services/api/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          PII_ENCRYPTION_KEY: ci-pii-test-key-32-characters-long!!
          ENVIRONMENT: test
          DATABASE_URL: postgresql+asyncpg://betaml:betaml@localhost/betaml
          REDIS_URL: redis://localhost:6379/0
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: |
          python -m pytest tests/ -q --tb=short \
            --cov=services/api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=40

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── Backend: lint (ruff) ───────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install linting tools
        run: pip install ruff==0.4.7

      - name: Run ruff on changed Python files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          mapfile -t files < <(
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
              | grep -E '^(services/api|libs)/.*\.py$' || true
          )

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No changed Python files under services/api or libs; skipping ruff."
            exit 0
          fi

          printf 'Linting files:\n%s\n' "${files[@]}"
          ruff check "${files[@]}" --output-format=github

  # ── Frontend: TypeScript strict check ─────────────────────────────────────
  frontend-typecheck:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: services/frontend
        run: npm ci

      - name: TypeScript strict check
        working-directory: services/frontend
        run: npx tsc --noEmit

  # ── Backend: security scan (bandit) ───────────────────────────────────────
  backend-security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit==1.7.8

      - name: Run bandit — SARIF report (medium+)
        run: |
          bandit -r services/api/ libs/ \
            --severity-level medium \
            --confidence-level medium \
            --exclude services/api/tests,services/api/seeds.py \
            --format sarif \
            --output bandit-results.sarif || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
        continue-on-error: true  # requires GitHub Advanced Security on private repos

      - name: Fail on high-severity findings
        run: |
          bandit -r services/api/ libs/ \
            --severity-level high \
            --confidence-level high \
            --exclude services/api/tests,services/api/seeds.py \
            --quiet

  # ── Docker: validate compose + spot-build critical images ─────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for compose validation
        run: cp .env.example .env

      - name: Validate docker-compose.yml syntax
        run: docker compose -f infra/docker-compose.yml config --quiet

      - name: Build API image (from repo root — Dockerfile copies libs/)
        run: |
          docker build \
            --file services/api/Dockerfile \
            --tag betaml/api:ci \
            .

      - name: Build frontend image (deps stage only — skips next build)
        run: |
          docker build \
            --file services/frontend/Dockerfile \
            --target deps \
            --tag betaml/frontend-deps:ci \
            services/frontend

  # ── Migrations: validar idempotencia em banco existente ───────────────────
  migration-idempotency:
    name: Migration Idempotency Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL only
        run: |
          cp .env.example .env
          docker compose -f infra/docker-compose.yml up -d postgres

      - name: Wait for PostgreSQL health
        run: |
          for i in $(seq 1 80); do
            if docker compose -f infra/docker-compose.yml exec -T postgres pg_isready -U betaml >/dev/null 2>&1; then
              exit 0
            fi
            echo "Waiting for postgres... ($i/80)" && sleep 3
          done
          echo "PostgreSQL did not become healthy in time" >&2
          docker compose -f infra/docker-compose.yml logs postgres || true
          exit 1

      - name: Run migration script twice (must be idempotent)
        run: |
          bash scripts/postgres_migrate_existing.sh
          bash scripts/postgres_migrate_existing.sh

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v || true

  # ── Migrations: validar trilha formal Alembic ─────────────────────────────
  alembic-smoke:
    name: Alembic Baseline Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install API dependencies
        run: |
          pip install --upgrade pip
          pip install -r services/api/requirements.txt

      - name: Validate Alembic baseline metadata
        working-directory: services/api
        run: |
          alembic -c alembic.ini heads
          alembic -c alembic.ini history
