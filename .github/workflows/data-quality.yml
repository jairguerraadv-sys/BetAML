name: Data Quality Gate

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"

jobs:
  data-quality:
    name: AML Data Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      POSTGRES_PASSWORD: ci-data-quality-postgres-pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Start PostgreSQL service
        run: |
          cp .env.example .env
          docker compose -f infra/docker-compose.yml up -d postgres

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 80); do
              docker compose -f infra/docker-compose.yml exec -T postgres pg_isready -U betaml -d betaml_dev >/dev/null 2>&1 && exit 0
            echo "Waiting for postgres... ($i/80)"
            sleep 3
          done
          echo "PostgreSQL not ready in time" >&2
          docker compose -f infra/docker-compose.yml logs postgres || true
          exit 1

      - name: Run data quality checks
        env:
          DATABASE_URL: postgresql://betaml:${{ env.POSTGRES_PASSWORD }}@localhost:5432/betaml_dev
        run: python scripts/data_quality_checks.py

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v || true
