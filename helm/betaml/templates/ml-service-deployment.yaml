{{- if .Values.mlService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "betaml.fullname" . }}-ml-service
  labels:
    {{- include "betaml.labels" . | nindent 4 }}
    app.kubernetes.io/component: ml-service
spec:
  replicas: {{ .Values.mlService.replicaCount }}
  selector:
    matchLabels:
      {{- include "betaml.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ml-service
  template:
    metadata:
      labels:
        {{- include "betaml.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ml-service
    spec:
      containers:
        - name: ml-service
          image: "{{ include "betaml.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.mlService.image.repository "tag" .Values.mlService.image.tag "globalTag" .Values.global.imageTag) }}"
          imagePullPolicy: {{ .Values.mlService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mlService.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "betaml.fullname" . }}-config
            - secretRef:
                name: {{ .Values.api.existingSecret }}
{{- end }}
