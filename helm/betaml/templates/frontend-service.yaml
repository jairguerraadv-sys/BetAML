apiVersion: v1
kind: Service
metadata:
  name: {{ include "betaml.fullname" . }}-frontend
  labels:
    {{- include "betaml.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "betaml.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
