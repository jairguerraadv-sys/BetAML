# Production topology example only.
# Use Terraform/Kubernetes/ECS or an equivalent platform for real production.
# This file intentionally does not publish Postgres, Redis, ClickHouse, MinIO or Redpanda ports.

networks:
  betaml-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:
  redpanda_data:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:?required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [betaml-net]

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [betaml-net]

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [betaml-net]

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:?required}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [betaml-net]

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: unless-stopped
    networks: [betaml-net]

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      redpanda: {condition: service_healthy}
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL:?required}
      REDIS_URL: ${REDIS_URL:?required}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      JWT_SECRET: ${JWT_SECRET:?required}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:?required}
      EPSILON_WEBHOOK_SECRET: ${EPSILON_WEBHOOK_SECRET:?required}
      INTERNAL_WEBHOOK_SECRET: ${INTERNAL_WEBHOOK_SECRET:?required}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?required}
      MINIO_BUCKET: ${MINIO_BUCKET:?required}
      EXTERNAL_VALIDATION_PROVIDER: ${EXTERNAL_VALIDATION_PROVIDER:?required}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-saas}
      ONPREM_TENANT_ID: ${ONPREM_TENANT_ID:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=2).read()"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks: [betaml-net]

  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile
    depends_on:
      api: {condition: service_healthy}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?required}
      BACKEND_API_URL: http://api:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [betaml-net]

  stream-processor:
    build:
      context: ..
      dockerfile: services/stream_processor/Dockerfile
    depends_on:
      redpanda: {condition: service_healthy}
      redis: {condition: service_healthy}
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
      REDIS_URL: ${REDIS_URL:?required}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    restart: unless-stopped
    networks: [betaml-net]

  rules-engine:
    build:
      context: ..
      dockerfile: services/rules_engine/Dockerfile
    depends_on:
      redpanda: {condition: service_healthy}
      postgres: {condition: service_healthy}
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    restart: unless-stopped
    networks: [betaml-net]
