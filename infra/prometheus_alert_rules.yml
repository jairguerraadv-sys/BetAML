groups:
  - name: betaml.slo
    interval: 30s
    rules:
      - record: api:availability:ratio5m
        expr: |
          sum(rate(http_requests_total{job="betaml-api",status!~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="betaml-api"}[5m]))

      - record: api:error_rate:ratio5m
        expr: |
          sum(rate(http_requests_total{job="betaml-api",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="betaml-api"}[5m]))

      - record: api:latency_p95_seconds5m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket{job="betaml-api"}[5m])) by (le)
          )

      - alert: SLOAvailabilityBurnWarning
        expr: api:availability:ratio5m < 0.995
        for: 15m
        labels:
          severity: warning
          slo: availability
        annotations:
          summary: "SLO de disponibilidade em risco (warning)"
          description: "Disponibilidade API em 5m abaixo de 99.5% (valor atual: {{ $value | humanizePercentage }})."
          runbook_url: "https://github.com/betaml/runbooks/blob/main/slo-availability.md"

      - alert: SLOAvailabilityBurnCritical
        expr: api:availability:ratio5m < 0.99
        for: 5m
        labels:
          severity: critical
          slo: availability
        annotations:
          summary: "SLO de disponibilidade violado (critical)"
          description: "Disponibilidade API em 5m abaixo de 99.0% (valor atual: {{ $value | humanizePercentage }})."
          runbook_url: "https://github.com/betaml/runbooks/blob/main/slo-availability.md"

      - alert: SLOLatencyP95Violation
        expr: api:latency_p95_seconds5m > 0.5
        for: 10m
        labels:
          severity: warning
          slo: latency
        annotations:
          summary: "SLO de latencia p95 violado"
          description: "Latencia p95 da API acima de 500ms por 10 minutos (valor atual: {{ $value | humanizeDuration }})."
          runbook_url: "https://github.com/betaml/runbooks/blob/main/slo-latency.md"

      - alert: SLOErrorRateViolation
        expr: api:error_rate:ratio5m > 0.01
        for: 10m
        labels:
          severity: warning
          slo: errors
        annotations:
          summary: "SLO de erro acima do limite"
          description: "Taxa de erro 5xx acima de 1% por 10 minutos (valor atual: {{ $value | humanizePercentage }})."
          runbook_url: "https://github.com/betaml/runbooks/blob/main/slo-error-rate.md"

  - name: betaml.api
    interval: 30s
    rules:
      - alert: APIHighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="betaml-api"}[5m])) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "API p99 latency > 1s"
          description: "API p99 latency is {{ $value | humanizeDuration }} (threshold: 1s)"
          runbook_url: "https://github.com/betaml/runbooks/blob/main/api-high-latency.md"

      - alert: APIHighErrorRate
        expr: |
          rate(http_requests_total{job="betaml-api",status=~"5.."}[5m])
          / rate(http_requests_total{job="betaml-api"}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API error rate > 5%"
          description: "API error rate is {{ $value | humanizePercentage }}"
          runbook_url: "https://github.com/betaml/runbooks/blob/main/api-high-error-rate.md"

      - alert: APIDown
        expr: up{job="betaml-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "BetAML API is down"
          description: "The BetAML API has been unreachable for more than 1 minute"
          runbook_url: "https://github.com/betaml/runbooks/blob/main/api-down.md"

  - name: betaml.kafka
    interval: 60s
    rules:
      - alert: KafkaConsumerLagHigh
        expr: |
          sum by (group, topic) (
            vectorized_kafka_log_end_offset - on(topic, partition)
            vectorized_kafka_consumer_group_committed_offset
          ) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag > 1000 messages"
          description: "Consumer group {{ $labels.group }} on topic {{ $labels.topic }} has lag {{ $value }}"
          runbook_url: "https://github.com/betaml/runbooks/blob/main/kafka-consumer-lag.md"

      - alert: RedpandaDown
        expr: up{job="redpanda"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redpanda (Kafka) is down"
          description: "Redpanda has been unreachable for more than 2 minutes"
          runbook_url: "https://github.com/betaml/runbooks/blob/main/redpanda-down.md"

  - name: betaml.database
    interval: 60s
    rules:
      - alert: PostgresConnectionsHigh
        expr: |
          pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections > 80"
          description: "PostgreSQL has {{ $value }} active connections (threshold: 80)"
          runbook_url: "https://github.com/betaml/runbooks/blob/main/postgres-connections.md"

  - name: betaml.ml
    interval: 60s
    rules:
      - alert: MLServiceDown
        expr: up{job="betaml-ml-service"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "ML Service is down"
          description: "ML scoring service unavailable — falling back to rules-only mode"
          runbook_url: "https://github.com/betaml/runbooks/blob/main/ml-service-down.md"

      - alert: MLScoringLatencyHigh
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="betaml-ml-service",handler="/score"}[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ML scoring p99 > 2s"
          description: "ML scoring p99 latency is {{ $value | humanizeDuration }}"
          runbook_url: "https://github.com/betaml/runbooks/blob/main/ml-scoring-latency.md"

      - alert: MLScoringFailuresDetected
        expr: increase(betaml_ml_scoring_failures_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Falhas de scoring ML detectadas"
          description: "Foram observadas {{ $value }} falhas de scoring ML nos últimos 15 minutos."
          runbook_url: "https://github.com/betaml/runbooks/blob/main/ml-scoring-failures.md"

  - name: betaml.business
    interval: 120s
    rules:
      - alert: HighAlertQueue
        expr: |
          sum(betaml_open_alerts_total) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "More than 100 open alerts"
          description: "There are {{ $value }} open alerts requiring analyst attention"
          runbook_url: "https://github.com/betaml/runbooks/blob/main/high-alert-queue.md"

      - alert: IngestPipelineStalled
        expr: |
          sum(rate(http_requests_total{job="betaml-api",handler=~"/ingest.*",method="POST"}[15m])) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "No events ingested in last 15 minutes"
          description: "Ingest pipeline may be stalled. Check connectors and Kafka."
          runbook_url: "https://github.com/betaml/runbooks/blob/main/ingest-pipeline-stalled.md"

      - alert: RulesEngineDown
        expr: up{job="betaml-rules-engine"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Rules engine indisponível"
          description: "O exporter do rules engine não responde há mais de 2 minutos."
          runbook_url: "https://github.com/betaml/runbooks/blob/main/rules-engine-down.md"

      - alert: StreamProcessorDown
        expr: up{job="betaml-stream-processor"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Stream processor indisponível"
          description: "O exporter do stream processor não responde há mais de 2 minutos."
          runbook_url: "https://github.com/betaml/runbooks/blob/main/stream-processor-down.md"

      - alert: DLQPending
        expr: sum(betaml_ingest_errors_unresolved) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DLQ com eventos pendentes"
          description: "Há {{ $value }} eventos pendentes na DLQ / quarentena."
          runbook_url: "https://github.com/betaml/runbooks/blob/main/dlq-pending.md"
