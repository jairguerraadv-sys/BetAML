networks:
  betaml-net:
    driver: bridge

# Carrega segredos do arquivo .env (crie com: cp ../.env.example ../.env)
# NUNCA comite .env com credenciais reais.

services:
  # ─── DATABASES ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: betaml-postgres
    env_file: ../.env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-betaml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB:       ${POSTGRES_DB:-betaml_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./migration_v2.sql:/docker-entrypoint-initdb.d/02-migration.sql
      - ./migration_v3.sql:/docker-entrypoint-initdb.d/03-migration.sql
      - ./migration_v4.sql:/docker-entrypoint-initdb.d/04-migration.sql
      - ./migration_v5.sql:/docker-entrypoint-initdb.d/05-migration.sql
      - ./migration_v6.sql:/docker-entrypoint-initdb.d/06-migration.sql
      - ./migration_v7.sql:/docker-entrypoint-initdb.d/07-migration.sql
      - ./migration_v8.sql:/docker-entrypoint-initdb.d/08-migration.sql
      - ./migration_v9.sql:/docker-entrypoint-initdb.d/09-migration.sql
      - ./migration_v10.sql:/docker-entrypoint-initdb.d/10-migration.sql
      - ./migration_v11.sql:/docker-entrypoint-initdb.d/11-migration.sql
      - ./migration_v12.sql:/docker-entrypoint-initdb.d/12-migration.sql
      - ./migration_v13.sql:/docker-entrypoint-initdb.d/13-migration.sql
      - ./migration_v14.sql:/docker-entrypoint-initdb.d/14-migration.sql
      - ./migration_v15.sql:/docker-entrypoint-initdb.d/15-migration.sql
      - ./migration_v16.sql:/docker-entrypoint-initdb.d/16-migration.sql
      - ./migration_v17.sql:/docker-entrypoint-initdb.d/17-migration.sql
      - ./migration_v18.sql:/docker-entrypoint-initdb.d/18-migration.sql
      - ./migration_v19.sql:/docker-entrypoint-initdb.d/19-migration.sql
      - ./migration_v20.sql:/docker-entrypoint-initdb.d/20-migration.sql
      - ./migration_v21.sql:/docker-entrypoint-initdb.d/21-migration.sql
      - ./migration_v22.sql:/docker-entrypoint-initdb.d/22-migration.sql
      - ./migration_v23.sql:/docker-entrypoint-initdb.d/23-migration.sql
      - ./migration_v24.sql:/docker-entrypoint-initdb.d/24-migration.sql
      - ./migration_v25.sql:/docker-entrypoint-initdb.d/25-migration.sql
      - ./migration_v26.sql:/docker-entrypoint-initdb.d/26-migration.sql
      - ./migration_v27.sql:/docker-entrypoint-initdb.d/27-migration.sql
      - ./migration_v28.sql:/docker-entrypoint-initdb.d/28-migration.sql
      - ./migration_v29.sql:/docker-entrypoint-initdb.d/29-migration.sql
      - ./migration_v30.sql:/docker-entrypoint-initdb.d/30-migration.sql
      - ./migration_v31.sql:/docker-entrypoint-initdb.d/31-migration.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-betaml}\" -d \"$${POSTGRES_DB:-betaml_dev}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  redis:
    image: redis:7-alpine
    container_name: betaml-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  minio:
    image: minio/minio:latest
    container_name: betaml-minio
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: betaml-clickhouse
    environment:
      CLICKHOUSE_DB: betaml
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "8123:8123"
      - "9900:9000"   # porta host diferente para evitar conflito com MinIO
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  # ─── EVENT STREAMING (Redpanda — Kafka-compatible) ─
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: betaml-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "9092:9092"
      - "29092:29092"
      - "8081:8081"   # Schema Registry
      - "8082:8082"   # Pandaproxy (REST)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 8
    networks: [betaml-net]

  redpanda-console:
    image: redpandadata/console:v2.5.2
    container_name: betaml-console
    depends_on: [redpanda]
    environment:
      CONFIG_FILEPATH: /etc/redpanda-console/config.yaml
    volumes:
      - ./configs/redpanda-console.yaml:/etc/redpanda-console/config.yaml:ro
    ports:
      - "8080:8080"
    networks: [betaml-net]

  # ─── TOPIC INIT ──────────────────────────────────
  topic-init:
    image: redpandadata/redpanda:v24.1.1
    container_name: betaml-topic-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
          for topic in raw.players raw.transactions raw.bets raw.device_events \
                       canonical.players canonical.transactions canonical.bets canonical.device_events \
                       scoring.alerts cases.events ingest.jobs; do
            rpk topic create $$topic --brokers redpanda:29092 --partitions 6 --replicas 1 2>/dev/null || true
          done

          for topic in canonical.kyc_events canonical.responsible_gambling_events canonical.account_status_changes \
                       features.player_daily ingest.jobs.reprocess feedback.labels \
                       canonical.transactions.dlq canonical.bets.dlq canonical.device_events.dlq \
                       canonical.kyc_events.dlq canonical.responsible_gambling_events.dlq canonical.account_status_changes.dlq \
                       ingest.jobs.dlq ingest.jobs.reprocess.dlq; do
            rpk topic create $$topic --brokers redpanda:29092 --partitions 1 --replicas 1 2>/dev/null || true
          done
          echo "Tópicos criados."
    networks: [betaml-net]
    restart: "no"

  # ─── APPLICATION SERVICES ─────────────────────────
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: betaml-api
    env_file: ../.env
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      redpanda: {condition: service_healthy}
    environment:
      # Use betaml_app by default so RLS/FORCE RLS is effective in dev.
      # Override via DATABASE_URL in .env if needed.
      DATABASE_URL:            ${DATABASE_URL:-postgresql://betaml_app:app_devpass_change_me@postgres:5432/betaml_dev}
      REDIS_URL:               ${REDIS_URL:-redis://:devpass@redis:6379/0}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
      JWT_SECRET:              ${JWT_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      JWT_ALGORITHM:           ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MIN: ${ACCESS_TOKEN_EXPIRE_MIN:-60}
      MINIO_ENDPOINT:          ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY:        ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY:        ${MINIO_SECRET_KEY:-minio123}
      MINIO_BUCKET:            ${MINIO_BUCKET:-betaml-lakehouse}
      CLICKHOUSE_HOST:         ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT:         ${CLICKHOUSE_PORT:-9000}
      CLICKHOUSE_DB:           ${CLICKHOUSE_DB:-betaml}
      ML_SERVICE_URL:          ${ML_SERVICE_URL:-http://ml-service:8001}
      RULES_ENGINE_METRICS_URL: ${RULES_ENGINE_METRICS_URL:-http://rules-engine:8002/metrics}
      STREAM_PROCESSOR_METRICS_URL: ${STREAM_PROCESSOR_METRICS_URL:-http://stream-processor:8003/metrics}
      REDPANDA_ADMIN_URL:      ${REDPANDA_ADMIN_URL:-http://redpanda:9644}
      # ATENÇÃO: PII_ENCRYPTION_KEY DEVE ser substituído em staging/produção.
      # Se JWT_SECRET ou PII_ENCRYPTION_KEY mantiverem valor padrão fora de 'development',
      # o startup da API lançará RuntimeError e recusará subir.
      PII_ENCRYPTION_KEY:      ${PII_ENCRYPTION_KEY:-ZGV2LXNlY3JldC1lbmNyeXB0aW9uLWtleS0zMmJ5}
      ENVIRONMENT:             ${ENVIRONMENT:-development}
      DEPLOYMENT_MODE:         ${DEPLOYMENT_MODE:-saas}
      ONPREM_TENANT_ID:        ${ONPREM_TENANT_ID:-}
      SANCTIONS_CSV_PATH:      /data/sanctions.csv
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
    ports:
      - "8000:8000"
    volumes:
      - ../services/api:/app
      - ../libs:/app/libs
      - ../datasets/sanctions_sample.csv:/data/sanctions.csv:ro
    command: >
      bash -c "set -euo pipefail; \
      APP_DATABASE_URL=\"$$DATABASE_URL\"; \
      SEED_DATABASE_URL=\"postgresql://$$POSTGRES_USER:$$POSTGRES_PASSWORD@postgres:5432/$$POSTGRES_DB\"; \
      AUTO_SEED=\"$${API_AUTO_SEED:-}\"; \
      if [ -z \"$$AUTO_SEED\" ]; then \
        if [ \"$$ENVIRONMENT\" = \"development\" ] || [ \"$$ENVIRONMENT\" = \"test\" ]; then AUTO_SEED=true; else AUTO_SEED=false; fi; \
      fi; \
      if [ \"$$AUTO_SEED\" = \"true\" ]; then \
        echo 'Running API seed bootstrap'; \
        DATABASE_URL=\"$$SEED_DATABASE_URL\" python seeds.py; \
      else \
        echo 'Skipping API seed bootstrap'; \
      fi; \
      DATABASE_URL=\"$$APP_DATABASE_URL\" uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [betaml-net]

  stream-processor:
    build:
      context: ..
      dockerfile: services/stream_processor/Dockerfile
    container_name: betaml-stream-processor
    env_file: ../.env
    depends_on:
      redpanda: {condition: service_healthy}
      redis:    {condition: service_healthy}
      clickhouse: {condition: service_healthy}
      postgres: {condition: service_healthy}
    environment:
      DATABASE_URL:            ${DATABASE_URL:-postgresql://betaml_app:app_devpass_change_me@postgres:5432/betaml_dev}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
      REDIS_URL:               ${REDIS_URL:-redis://:devpass@redis:6379/0}
      MINIO_ENDPOINT:          ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY:        ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY:        ${MINIO_SECRET_KEY:-minio123}
      CLICKHOUSE_HOST:         ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT:         ${CLICKHOUSE_PORT:-9000}
      CLICKHOUSE_DB:           ${CLICKHOUSE_DB:-betaml}
      METRICS_PORT:            ${STREAM_PROCESSOR_METRICS_PORT:-8003}
      ENVIRONMENT:             ${ENVIRONMENT:-development}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
    volumes:
      - ../services/stream_processor:/app
      - ../libs:/app/libs
    command: python main.py
    restart: unless-stopped
    networks: [betaml-net]

  rules-engine:
    build:
      context: ..
      dockerfile: services/rules_engine/Dockerfile
    container_name: betaml-rules-engine
    env_file: ../.env
    depends_on:
      redpanda: {condition: service_healthy}
      redis:    {condition: service_healthy}
      postgres: {condition: service_healthy}
    environment:
      DATABASE_URL:            ${DATABASE_URL:-postgresql://betaml_app:app_devpass_change_me@postgres:5432/betaml_dev}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
      REDIS_URL:               ${REDIS_URL:-redis://:devpass@redis:6379/0}
      ML_SERVICE_URL:          ${ML_SERVICE_URL:-http://ml-service:8001}
      METRICS_PORT:            ${RULES_ENGINE_METRICS_PORT:-8002}
      ENVIRONMENT:             ${ENVIRONMENT:-development}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
    volumes:
      - ../services/rules_engine:/app
      - ../libs:/app/libs
    command: python main.py
    networks: [betaml-net]

  ml-service:
    build:
      context: ..
      dockerfile: services/ml_service/Dockerfile
    container_name: betaml-ml-service
    env_file: ../.env
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    environment:
      DATABASE_URL:    ${DATABASE_URL:-postgresql://betaml_app:app_devpass_change_me@postgres:5432/betaml_dev}
      REDIS_URL:       ${REDIS_URL:-redis://:devpass@redis:6379/0}
      MINIO_ENDPOINT:  ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      ML_MODEL_BUCKET:  ${ML_MODEL_BUCKET:-betaml-models}
      REDPANDA_ADMIN_URL: ${REDPANDA_ADMIN_URL:-http://redpanda:9644}
      ENVIRONMENT:      ${ENVIRONMENT:-development}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
    ports:
      - "8001:8001"
    volumes:
      - ../services/ml_service:/app
      - ../libs:/app/libs
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    networks: [betaml-net]

  ml-trainer:
    build:
      context: ..
      dockerfile: services/ml_trainer/Dockerfile
    container_name: betaml-ml-trainer
    env_file: ../.env
    depends_on:
      postgres: {condition: service_healthy}
      minio:    {condition: service_started}
    environment:
      DATABASE_URL:     ${DATABASE_URL:-postgresql://betaml_app:app_devpass_change_me@postgres:5432/betaml_dev}
      MINIO_ENDPOINT:   ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      ENVIRONMENT:      ${ENVIRONMENT:-development}
    networks: [betaml-net]
    restart: unless-stopped

  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile.dev
    container_name: betaml-frontend
    depends_on: [api]
    environment:
      BACKEND_API_URL:                ${BACKEND_API_URL:-http://api:8000}
      NEXT_PUBLIC_API_URL:            ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_TIMEOUT:        ${NEXT_PUBLIC_API_TIMEOUT:-30000}
      NEXT_PUBLIC_DEPLOYMENT_MODE:    ${DEPLOYMENT_MODE:-saas}
    ports:
      - "3000:3000"
    volumes:
      - ../services/frontend:/app
      - /app/node_modules
      - /app/.next
    networks: [betaml-net]

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: betaml-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks: [betaml-net]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: betaml-alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    environment:
      ALERTMANAGER_FROM_EMAIL: ${ALERTMANAGER_FROM_EMAIL:-betaml-alerts@betaml.io}
      SMTP_SMARTHOST: ${SMTP_SMARTHOST:-localhost:587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      OPS_EMAIL: ${OPS_EMAIL:-ops@betaml.io}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-http://api:8000/internal/alerts/webhook}
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    ports:
      - "9093:9093"
    networks:
      - betaml-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: betaml-grafana
    environment:
      GF_SECURITY_ADMIN_USER:     ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/betaml-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on: [prometheus, loki]
    networks: [betaml-net]
    restart: unless-stopped

  # ─── DISTRIBUTED TRACING (Jaeger — OTLP collector) ─
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: betaml-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    networks: [betaml-net]
    restart: unless-stopped

  # ─── LOG AGGREGATION (Loki + Promtail) ─────────────
  loki:
    image: grafana/loki:2.9.6
    container_name: betaml-loki
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./configs/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [betaml-net]
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.6
    container_name: betaml-promtail
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./configs/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki: {condition: service_healthy}
    networks: [betaml-net]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:
  redpanda_data:
  prometheus_data:
  grafana_data:
  loki_data:
