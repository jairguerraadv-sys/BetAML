version: "3.9"

services:
  # ─── DATABASES ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: betaml-postgres
    environment:
      POSTGRES_USER: betaml
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: betaml_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./migration_v2.sql:/docker-entrypoint-initdb.d/02-migration.sql
      - ./migration_v3.sql:/docker-entrypoint-initdb.d/03-migration.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betaml"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  redis:
    image: redis:7-alpine
    container_name: betaml-redis
    command: redis-server --requirepass devpass
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devpass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  minio:
    image: minio/minio:latest
    container_name: betaml-minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: betaml-clickhouse
    environment:
      CLICKHOUSE_DB: betaml
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "8123:8123"
      - "9900:9000"   # porta host diferente para evitar conflito com MinIO
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  # ─── EVENT STREAMING (Redpanda — Kafka-compatible) ─
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: betaml-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "9092:9092"
      - "29092:29092"
      - "8081:8081"   # Schema Registry
      - "8082:8082"   # Pandaproxy (REST)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 8
    networks: [betaml-net]

  redpanda-console:
    image: redpandadata/console:v2.5.2
    container_name: betaml-console
    depends_on: [redpanda]
    environment:
      CONFIG_FILEPATH: /etc/redpanda-console/config.yaml
    volumes:
      - ./configs/redpanda-console.yaml:/etc/redpanda-console/config.yaml:ro
    ports:
      - "8080:8080"
    networks: [betaml-net]

  # ─── TOPIC INIT ──────────────────────────────────
  topic-init:
    image: redpandadata/redpanda:v24.1.1
    container_name: betaml-topic-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        for topic in raw.players raw.transactions raw.bets raw.device_events \
                     canonical.players canonical.transactions canonical.bets canonical.device_events \
                     features.player_daily scoring.alerts cases.events ingest.jobs; do
          rpk topic create $$topic --brokers redpanda:29092 --partitions 6 --replicas 1 2>/dev/null || true
        done
        echo "Tópicos criados."
    networks: [betaml-net]
    restart: "no"

  # ─── APPLICATION SERVICES ─────────────────────────
  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: betaml-api
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      redpanda: {condition: service_healthy}
    environment:
      DATABASE_URL:            postgresql://betaml:devpass@postgres:5432/betaml_dev
      REDIS_URL:               redis://:devpass@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      JWT_SECRET:              dev-secret-change-me
      JWT_ALGORITHM:           HS256
      ACCESS_TOKEN_EXPIRE_MIN: "60"
      MINIO_ENDPOINT:          http://minio:9000
      MINIO_ACCESS_KEY:        minio
      MINIO_SECRET_KEY:        minio123
      MINIO_BUCKET:            betaml-lakehouse
      CLICKHOUSE_HOST:         clickhouse
      CLICKHOUSE_PORT:         "9000"
      CLICKHOUSE_DB:           betaml
      ENVIRONMENT:             development
    ports:
      - "8000:8000"
    volumes:
      - ../services/api:/app
    command: >
      bash -c "python seeds.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks: [betaml-net]

  stream-processor:
    build:
      context: ../services/stream_processor
      dockerfile: Dockerfile
    container_name: betaml-stream-processor
    depends_on:
      redpanda: {condition: service_healthy}
      redis:    {condition: service_healthy}
      clickhouse: {condition: service_healthy}
    environment:
      DATABASE_URL:            postgresql://betaml:devpass@postgres:5432/betaml_dev
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      REDIS_URL:               redis://:devpass@redis:6379/0
      MINIO_ENDPOINT:          http://minio:9000
      MINIO_ACCESS_KEY:        minio
      MINIO_SECRET_KEY:        minio123
      CLICKHOUSE_HOST:         clickhouse
      CLICKHOUSE_PORT:         "9000"
      CLICKHOUSE_DB:           betaml
      ENVIRONMENT:             development
    volumes:
      - ../services/stream_processor:/app
      - ../libs:/app/libs
    command: python main.py
    networks: [betaml-net]

  rules-engine:
    build:
      context: ../services/rules_engine
      dockerfile: Dockerfile
    container_name: betaml-rules-engine
    depends_on:
      redpanda: {condition: service_healthy}
      redis:    {condition: service_healthy}
      postgres: {condition: service_healthy}
    environment:
      DATABASE_URL:            postgresql://betaml:devpass@postgres:5432/betaml_dev
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      REDIS_URL:               redis://:devpass@redis:6379/0
      ENVIRONMENT:             development
    volumes:
      - ../services/rules_engine:/app
      - ../libs:/app/libs
    command: python main.py
    networks: [betaml-net]

  ml-service:
    build:
      context: ../services/ml_service
      dockerfile: Dockerfile
    container_name: betaml-ml-service
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    environment:
      DATABASE_URL:   postgresql://betaml:devpass@postgres:5432/betaml_dev
      REDIS_URL:      redis://:devpass@redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      ML_MODEL_BUCKET:  betaml-models
      ENVIRONMENT:      development
    ports:
      - "8001:8001"
    volumes:
      - ../services/ml_service:/app
      - ../libs:/app/libs
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    networks: [betaml-net]

  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile
    container_name: betaml-frontend
    depends_on: [api]
    environment:
      NEXT_PUBLIC_API_URL:     http://localhost:8000
      NEXT_PUBLIC_API_TIMEOUT: "30000"
    ports:
      - "3000:3000"
    volumes:
      - ../services/frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks: [betaml-net]

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: betaml-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks: [betaml-net]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: betaml-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/betaml-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on: [prometheus]
    networks: [betaml-net]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:
  redpanda_data:
  prometheus_data:
  grafana_data:

networks:
  betaml-net:
    driver: bridge
