networks:
  betaml-net:
    driver: bridge

# Carrega segredos do arquivo .env (crie com: cp ../.env.example ../.env)
# NUNCA comite .env com credenciais reais.

services:
  # ─── DATABASES ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: betaml-postgres
    env_file: ../.env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-betaml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB:       ${POSTGRES_DB:-betaml_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./migration_v2.sql:/docker-entrypoint-initdb.d/02-migration.sql
      - ./migration_v3.sql:/docker-entrypoint-initdb.d/03-migration.sql
      - ./migration_v4.sql:/docker-entrypoint-initdb.d/04-migration.sql
      - ./migration_v5.sql:/docker-entrypoint-initdb.d/05-migration.sql
      - ./migration_v6.sql:/docker-entrypoint-initdb.d/06-migration.sql
      - ./migration_v7.sql:/docker-entrypoint-initdb.d/07-migration.sql
      - ./migration_v8.sql:/docker-entrypoint-initdb.d/08-migration.sql
      - ./migration_v9.sql:/docker-entrypoint-initdb.d/09-migration.sql
      - ./migration_v10.sql:/docker-entrypoint-initdb.d/10-migration.sql
      - ./migration_v11.sql:/docker-entrypoint-initdb.d/11-migration.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betaml"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  redis:
    image: redis:7-alpine
    container_name: betaml-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  minio:
    image: minio/minio:latest
    container_name: betaml-minio
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: betaml-clickhouse
    environment:
      CLICKHOUSE_DB: betaml
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "8123:8123"
      - "9900:9000"   # porta host diferente para evitar conflito com MinIO
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [betaml-net]

  # ─── EVENT STREAMING (Redpanda — Kafka-compatible) ─
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: betaml-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "9092:9092"
      - "29092:29092"
      - "8081:8081"   # Schema Registry
      - "8082:8082"   # Pandaproxy (REST)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 8
    networks: [betaml-net]

  redpanda-console:
    image: redpandadata/console:v2.5.2
    container_name: betaml-console
    depends_on: [redpanda]
    environment:
      CONFIG_FILEPATH: /etc/redpanda-console/config.yaml
    volumes:
      - ./configs/redpanda-console.yaml:/etc/redpanda-console/config.yaml:ro
    ports:
      - "8080:8080"
    networks: [betaml-net]

  # ─── TOPIC INIT ──────────────────────────────────
  topic-init:
    image: redpandadata/redpanda:v24.1.1
    container_name: betaml-topic-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        for topic in raw.players raw.transactions raw.bets raw.device_events \
                     canonical.players canonical.transactions canonical.bets canonical.device_events \
                     features.player_daily scoring.alerts cases.events ingest.jobs; do
          rpk topic create $$topic --brokers redpanda:29092 --partitions 6 --replicas 1 2>/dev/null || true
        done
        echo "Tópicos criados."
    networks: [betaml-net]
    restart: "no"

  # ─── APPLICATION SERVICES ─────────────────────────
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: betaml-api
    env_file: ../.env
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      redpanda: {condition: service_healthy}
    environment:
      DATABASE_URL:            ${DATABASE_URL:-postgresql://betaml:devpass@postgres:5432/betaml_dev}
      REDIS_URL:               ${REDIS_URL:-redis://:devpass@redis:6379/0}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
      JWT_SECRET:              ${JWT_SECRET:-dev-secret-change-me}
      JWT_ALGORITHM:           ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MIN: ${ACCESS_TOKEN_EXPIRE_MIN:-60}
      MINIO_ENDPOINT:          ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY:        ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY:        ${MINIO_SECRET_KEY:-minio123}
      MINIO_BUCKET:            ${MINIO_BUCKET:-betaml-lakehouse}
      CLICKHOUSE_HOST:         ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT:         ${CLICKHOUSE_PORT:-9000}
      CLICKHOUSE_DB:           ${CLICKHOUSE_DB:-betaml}
      # ATENÇÃO: PII_ENCRYPTION_KEY DEVE ser substituído em staging/produção.
      # Se JWT_SECRET ou PII_ENCRYPTION_KEY mantiverem valor padrão fora de 'development',
      # o startup da API lançará RuntimeError e recusará subir.
      PII_ENCRYPTION_KEY:      ${PII_ENCRYPTION_KEY:-ZGV2LXNlY3JldC1lbmNyeXB0aW9uLWtleS0zMmJ5}
      ENVIRONMENT:             ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ../services/api:/app
      - ../libs:/app/libs
    command: >
      bash -c "python seeds.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks: [betaml-net]

  stream-processor:
    build:
      context: ..
      dockerfile: services/stream_processor/Dockerfile
    container_name: betaml-stream-processor
    env_file: ../.env
    depends_on:
      redpanda: {condition: service_healthy}
      redis:    {condition: service_healthy}
      clickhouse: {condition: service_healthy}
    environment:
      DATABASE_URL:            ${DATABASE_URL:-postgresql://betaml:devpass@postgres:5432/betaml_dev}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
      REDIS_URL:               ${REDIS_URL:-redis://:devpass@redis:6379/0}
      MINIO_ENDPOINT:          ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY:        ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY:        ${MINIO_SECRET_KEY:-minio123}
      CLICKHOUSE_HOST:         ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT:         ${CLICKHOUSE_PORT:-9000}
      CLICKHOUSE_DB:           ${CLICKHOUSE_DB:-betaml}
      ENVIRONMENT:             ${ENVIRONMENT:-development}
    volumes:
      - ../services/stream_processor:/app
      - ../libs:/app/libs
    command: python main.py
    networks: [betaml-net]

  rules-engine:
    build:
      context: ..
      dockerfile: services/rules_engine/Dockerfile
    container_name: betaml-rules-engine
    env_file: ../.env
    depends_on:
      redpanda: {condition: service_healthy}
      redis:    {condition: service_healthy}
      postgres: {condition: service_healthy}
    environment:
      DATABASE_URL:            ${DATABASE_URL:-postgresql://betaml:devpass@postgres:5432/betaml_dev}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:29092}
      REDIS_URL:               ${REDIS_URL:-redis://:devpass@redis:6379/0}
      ENVIRONMENT:             ${ENVIRONMENT:-development}
    volumes:
      - ../services/rules_engine:/app
      - ../libs:/app/libs
    command: python main.py
    networks: [betaml-net]

  ml-service:
    build:
      context: ..
      dockerfile: services/ml_service/Dockerfile
    container_name: betaml-ml-service
    env_file: ../.env
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    environment:
      DATABASE_URL:    ${DATABASE_URL:-postgresql://betaml:devpass@postgres:5432/betaml_dev}
      REDIS_URL:       ${REDIS_URL:-redis://:devpass@redis:6379/0}
      MINIO_ENDPOINT:  ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      ML_MODEL_BUCKET:  ${ML_MODEL_BUCKET:-betaml-models}
      ENVIRONMENT:      ${ENVIRONMENT:-development}
    ports:
      - "8001:8001"
    volumes:
      - ../services/ml_service:/app
      - ../libs:/app/libs
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    networks: [betaml-net]

  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile.dev
    container_name: betaml-frontend
    depends_on: [api]
    environment:
      NEXT_PUBLIC_API_URL:     ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_TIMEOUT: ${NEXT_PUBLIC_API_TIMEOUT:-30000}
    ports:
      - "3000:3000"
    volumes:
      - ../services/frontend:/app
      - /app/node_modules
      - /app/.next
    networks: [betaml-net]

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: betaml-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks: [betaml-net]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: betaml-grafana
    environment:
      GF_SECURITY_ADMIN_USER:     ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/betaml-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on: [prometheus]
    networks: [betaml-net]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:
  redpanda_data:
  prometheus_data:
  grafana_data: