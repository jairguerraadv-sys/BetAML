# Promtail configuration — collects Docker container logs and ships to Loki.

server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only betaml containers
      - source_labels: ["__meta_docker_container_name"]
        regex: "/betaml-(.+)"
        action: keep
      # Extract service name from container name (strip leading /)
      - source_labels: ["__meta_docker_container_name"]
        regex: "/betaml-(.+)"
        target_label: service
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # Ensure job label is always set
      - replacement: betaml
        target_label: job
    pipeline_stages:
      # Try to parse JSON logs (structlog output)
      - match:
          selector: '{job="betaml"}'
          stages:
            - json:
                expressions:
                  level: level
                  event: event
            - labels:
                level:
