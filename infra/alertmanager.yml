global:
  resolve_timeout: 5m
  smtp_from: '{{ getenv "ALERTMANAGER_FROM_EMAIL" "betaml-alerts@betaml.io" }}'
  smtp_smarthost: '{{ getenv "SMTP_SMARTHOST" "localhost:587" }}'
  smtp_auth_username: '{{ getenv "SMTP_USER" "" }}'
  smtp_auth_password: '{{ getenv "SMTP_PASS" "" }}'
  smtp_require_tls: true
  # Slack global (usado por receivers que não definem api_url própria)
  slack_api_url: '{{ getenv "SLACK_WEBHOOK_URL" "" }}'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning-receiver'
      repeat_interval: 4h

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://api:8000/internal/alerts/webhook'
        send_resolved: true

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://api:8000/internal/alerts/webhook'
        send_resolved: true
    email_configs:
      - to: '{{ getenv "OPS_EMAIL" "ops@betaml.io" }}'
        send_resolved: true
        headers:
          Subject: '[CRÍTICO] BetAML — {{ .CommonAnnotations.summary }}'
        require_tls: true
    slack_configs:
      - channel: '#betaml-critical'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} {{ .CommonAnnotations.summary }}'
        text: >-
          *Alerta:* {{ .CommonLabels.alertname }}
          *Severidade:* {{ .CommonLabels.severity }}
          *Descrição:* {{ .CommonAnnotations.description }}
          *Início:* {{ .Alerts.Firing | len }} firing, {{ .Alerts.Resolved | len }} resolved

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://api:8000/internal/alerts/webhook'
        send_resolved: true
    slack_configs:
      - channel: '#betaml-alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🟡{{ else }}✅{{ end }} {{ .CommonAnnotations.summary }}'
        text: >-
          *Alerta:* {{ .CommonLabels.alertname }}
          *Severidade:* {{ .CommonLabels.severity }}
          *Descrição:* {{ .CommonAnnotations.description }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
