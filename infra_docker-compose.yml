version: '3.9'

services:
  # ===================== DATABASES =====================
  
  postgres:
    image: postgres:16-alpine
    container_name: betaml-postgres
    environment:
      POSTGRES_USER: betaml
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: betaml_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betaml"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - betaml-net

  redis:
    image: redis:7-alpine
    container_name: betaml-redis
    command: redis-server --requirepass devpass
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - betaml-net

  minio:
    image: minio/minio:latest
    container_name: betaml-minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - betaml-net

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: betaml-clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - betaml-net

  # ===================== EVENT STREAMING =====================

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: betaml-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_DAYS: 30
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - betaml-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: betaml-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - betaml-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: betaml-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - betaml-net

  # ===================== SERVICES =====================

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: betaml-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://betaml:devpass@postgres:5432/betaml_dev
      REDIS_URL: redis://:devpass@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: dev-secret-change-me
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: betaml-lakehouse
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_DB: default
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
    command: bash -c "python seeds.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - betaml-net

  stream_processor:
    build:
      context: ./services/stream_processor
      dockerfile: Dockerfile
    container_name: betaml-stream-processor
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://betaml:devpass@postgres:5432/betaml_dev
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://:devpass@redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_DB: default
      ENVIRONMENT: development
    volumes:
      - ./services/stream_processor:/app
    command: python main.py
    networks:
      - betaml-net

  rules_engine:
    build:
      context: ./services/rules_engine
      dockerfile: Dockerfile
    container_name: betaml-rules-engine
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://betaml:devpass@postgres:5432/betaml_dev
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://:devpass@redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./services/rules_engine:/app
    command: python main.py
    networks:
      - betaml-net

  ml_service:
    build:
      context: ./services/ml_service
      dockerfile: Dockerfile
    container_name: betaml-ml-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://betaml:devpass@postgres:5432/betaml_dev
      REDIS_URL: redis://:devpass@redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      ML_MODEL_BUCKET: betaml-models
      ENVIRONMENT: development
    ports:
      - "8001:8001"
    volumes:
      - ./services/ml_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - betaml-net

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: betaml-frontend
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_API_TIMEOUT: 30000
    ports:
      - "3000:3000"
    volumes:
      - ./services/frontend:/app
    command: npm run dev
    networks:
      - betaml-net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:
  kafka_data:
  zookeeper_data:

networks:
  betaml-net:
    driver: bridge
